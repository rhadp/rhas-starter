schemaVersion: 2.3.0
metadata:
  name: rhas-starter
  tags:
    - rhas
    - jumpstarter
    - aib
    - rhivos
    - autosd
components:
  #- name: runtime-pv
  #  volume:
  #    size: 2Gi
  - name: workspace
    container:
      image: ghcr.io/rhadp/rhas-starter:latest
      memoryLimit: "4Gi"
      memoryRequest: "1Gi"
      cpuLimit: "4"
      cpuRequest: "1"
      mountSources: true
      volumeMounts:
        - name: workspace-config
          path: "/home/user/.config"
        - name: workspace-local
          path: "/home/user/.local"
  - name: workspace-config
    volume:
      size: 1Gi
  - name: workspace-local
    volume:
      size: 1Gi
